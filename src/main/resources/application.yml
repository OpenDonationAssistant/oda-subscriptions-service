micronaut:
  application:
    name: oda-subscriptions-service
  serde:
    serialization:
      inclusion: ALWAYS
  metrics:
    export:
      prometheus:
        enabled: true
        descriptions: true
        step: PT1M
    enabled: true
  security:
    authentication: bearer
    token:
      bearer:
        enabled: true
      jwt:
        signatures:
          jwks:
            keycloak:
              url: ${JWKS_URI}
  caches:
    jwks:
      expire-after-write: 240h
  executors:
    events-listener:
      type: fixed
      nThreads: 1
flyway:
  datasources:
    default:
      enabled: true
      schemas: 'subscriptions'
      default-schema: 'subscriptions'
endpoints:
  all:
    enabled: true
    sensitive: false
  caches:
    enabled: true
  loggers:
    write-sensitive: false
